services:
  postgres:
    image: postgres:16-alpine
    container_name: svaes-test-postgres
    environment:
      POSTGRES_USER: svaes
      POSTGRES_PASSWORD: svaes
      POSTGRES_DB: svaes_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svaes"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: svaes-test-redis
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
