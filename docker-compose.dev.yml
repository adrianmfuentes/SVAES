# ═══════════════════════════════════════════════════════════════════════════════
# SVAES - Docker Compose (Development / local testing)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# Requires: .env.dev  (copy from .env.dev.example and fill in SMTP credentials)
#
# Services exposed on localhost:
#   http://localhost      → Angular app (via nginx)
#   http://localhost:8000 → FastAPI (direct, Swagger at /docs)
# ═══════════════════════════════════════════════════════════════════════════════

name: svaes-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: svaes-dev-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: svaes
      POSTGRES_PASSWORD: svaes_dev
      POSTGRES_DB: svaes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svaes"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - svaes-dev-network

  redis:
    image: redis:7-alpine
    container_name: svaes-dev-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - svaes-dev-network

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: svaes-dev-engine
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8081
      ENGINE_API_KEY: dev-engine-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s
    networks:
      - svaes-dev-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: svaes-dev-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      UVICORN_LOG_LEVEL: warning
      DATABASE_URL: postgresql+psycopg://svaes:svaes_dev@postgres:5432/svaes
      REDIS_URL: redis://:redis_dev@redis:6379/0
      CELERY_BROKER_URL: redis://:redis_dev@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_dev@redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-key-not-for-production-use-at-all
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost,http://localhost:4200
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: dev-engine-key
      ADMIN_EMAIL: admin@svaes.local
      ADMIN_PASSWORD: admin_dev_pass
      APP_BASE_URL: http://localhost:4200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    volumes:
      - ./web/public/images:/app/static/images:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - svaes-dev-network

  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: svaes-dev-celery
    restart: unless-stopped
    command: celery -A src.infrastructure.secondary.queue.celery_app worker --loglevel=warning
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+psycopg://svaes:svaes_dev@postgres:5432/svaes
      REDIS_URL: redis://:redis_dev@redis:6379/0
      CELERY_BROKER_URL: redis://:redis_dev@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_dev@redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-key-not-for-production-use-at-all
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost,http://localhost:4200
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: dev-engine-key
      ADMIN_EMAIL: admin@svaes.local
      ADMIN_PASSWORD: admin_dev_pass
      APP_BASE_URL: http://localhost
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - svaes-dev-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: svaes-dev-web
    restart: unless-stopped
    ports:
      - "4200:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - svaes-dev-network
    depends_on:
      api:
        condition: service_healthy

volumes:
  dev_postgres_data:

networks:
  svaes-dev-network:
    driver: bridge
