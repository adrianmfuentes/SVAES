name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: "pip install --only-binary :all: --require-hashes -r .github/requirements/uv.txt"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/testdb
          JWT_SECRET_KEY: ci-test-secret-key-not-used-in-production
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "30"
          ALLOWED_ORIGINS: "http://localhost"
          ENVIRONMENT: test
        run: uv run --frozen --no-build --project api --extra dev pytest --cov=api/src --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}