name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: svaes
          POSTGRES_PASSWORD: svaes
          POSTGRES_DB: svaes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://svaes:svaes@localhost:5432/svaes_test
          JWT_SECRET_KEY: ci-test-secret-key-not-used-in-production
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "30"
          ALLOWED_ORIGINS: "http://localhost"
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ENGINE_URL: http://localhost:8081
          ENGINE_API_KEY: ci-test-key
          ADMIN_EMAIL: admin@test.local
          ADMIN_PASSWORD: test-password-not-for-production
          ENCRYPTION_KEY: HnVk8Q2xLm9pR4sT6wYzA1bC3dF5gJ7kN=
          TEST_POSTGRES_USER: svaes
          TEST_POSTGRES_PASSWORD: svaes
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: "5432"
          TEST_POSTGRES_DB: svaes_test
          POSTGRES_PASSWORD: svaes
        run: uv run --frozen --no-build --project api --extra dev pytest --cov=api/src --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}