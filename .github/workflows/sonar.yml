name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: svaes
          POSTGRES_PASSWORD: svaes
          POSTGRES_DB: svaes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"
          version: "0.11.15"

      - name: Run unit tests
        run: uv run --frozen --no-build --project api --extra dev pytest tests/unit --cov=api/src --cov-report=

      - name: Run acceptance structure tests
        run: uv run --frozen --no-build --project api --extra dev pytest tests/acceptance/test_acceptance_structure.py -v --tb=short

      - name: Run integration and security tests
        env:
          DATABASE_URL: postgresql+asyncpg://svaes:svaes@localhost:5432/svaes_test
          JWT_SECRET_KEY: ci-test-secret-key-not-used-in-production
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "30"
          ALLOWED_ORIGINS: "http://localhost"
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ENGINE_URL: http://localhost:8081
          ENGINE_API_KEY: ci-test-key
          ADMIN_EMAIL: admin@test.local
          ADMIN_PASSWORD: test-password-not-for-production
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          API_KEY_PEPPER: ci-test-api-key-pepper-not-for-production
          TEST_POSTGRES_USER: svaes
          TEST_POSTGRES_PASSWORD: svaes
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: "5432"
          TEST_POSTGRES_DB: svaes_test
          POSTGRES_PASSWORD: svaes
        run: uv run --frozen --no-build --project api --extra dev pytest tests/integration tests/security --cov=api/src --cov-append --cov-report=xml

      - name: Run performance structure and RNF tests
        run: uv run --frozen --no-build --project api --extra dev pytest tests/performance/test_coverage_threshold.py tests/performance/test_rnf_coverage.py tests/performance/test_rnf_security_rf.py -v --tb=short

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.0
        with:
          version: "10"

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run frontend Angular/Vitest tests
        working-directory: web
        run: pnpm exec ng test --watch=false --configuration=ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b
        with:
          tool: cargo-llvm-cov

      - name: Run Rust engine coverage
        working-directory: engine
        run: cargo llvm-cov --lcov --output-path lcov.info --ignore-filename-regex "main\.rs$"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
