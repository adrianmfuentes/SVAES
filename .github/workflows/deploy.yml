name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      force_rebuild:
        description: 'Force rebuild of Docker images'
        required: false
        default: false
        type: boolean
      skip_migration:
        description: 'Skip database migration'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository_owner }}/svaes-api
  WEB_IMAGE: ${{ github.repository_owner }}/svaes-web
  ENGINE_IMAGE: ${{ github.repository_owner }}/svaes-engine

jobs:
  check-sonar-status:
    name: Check Sonar workflow status
    runs-on: ubuntu-latest
    steps:
      - name: Check Sonar workflow run
        run: |
          latest_run=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=sonar.yml --limit 1 --json status,conclusion --jq '.[0]' 2>/dev/null)
          if [ -z "$latest_run" ] || [ "$latest_run" = "null" ]; then
            echo "ERROR: No Sonar workflow run found. Deploy blocked."
            exit 1
          fi
          conclusion=$(echo "$latest_run" | jq -r '.conclusion')
          if [ "$conclusion" != "success" ]; then
            echo "ERROR: Last Sonar workflow run was not successful (conclusion: $conclusion). Deploy blocked."
            exit 1
          fi
          echo "Last Sonar workflow run was successful"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: check-sonar-status
    name: Build and Push Images
    runs-on: [self-hosted, ARM64, oracle-ampere]
    permissions:
      contents: read
      packages: write
    outputs:
      api_tag: ${{ steps.meta-api.outputs.version }}
      web_tag: ${{ steps.meta-web.outputs.version }}
      engine_tag: ${{ steps.meta-engine.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Engine
        id: meta-engine
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.ENGINE_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest

      - name: Build and push Engine image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: ${{ steps.meta-engine.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Debug - secrets vs vars
        env:
          _HOST_S: ${{ secrets.SERVER_HOST }}
          _USER_S: ${{ secrets.SERVER_USER }}
          _KEY_S: ${{ secrets.SERVER_SSH_KEY }}
          _HOST_V: ${{ vars.SERVER_HOST }}
          _USER_V: ${{ vars.SERVER_USER }}
          _KEY_V: ${{ vars.SERVER_SSH_KEY }}
        run: |
          echo "=== Environment input: ${{ inputs.environment }} ==="
          echo "secrets.SERVER_HOST  : $([ -n "$_HOST_S" ] && echo SET || echo EMPTY)"
          echo "secrets.SERVER_USER  : $([ -n "$_USER_S" ] && echo SET || echo EMPTY)"
          echo "secrets.SERVER_SSH_KEY: $([ -n "$_KEY_S" ] && echo SET || echo EMPTY)"
          echo "vars.SERVER_HOST     : $([ -n "$_HOST_V" ] && echo SET || echo EMPTY)"
          echo "vars.SERVER_USER     : $([ -n "$_USER_V" ] && echo SET || echo EMPTY)"
          echo "vars.SERVER_SSH_KEY  : $([ -n "$_KEY_V" ] && echo SET || echo EMPTY)"

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY || vars.SERVER_SSH_KEY }}
        run: |
          if [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USER" ] || [ -z "$SERVER_SSH_KEY" ]; then
            echo "ERROR: SERVER_HOST, SERVER_USER, or SERVER_SSH_KEY is not set in the '${{ inputs.environment }}' environment."
            echo "Add them under Settings > Environments > ${{ inputs.environment }} > Secrets (or Secrets > Actions for repo-level)."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keyscan -T 15 -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan failed (server may restrict incoming scans); disabling StrictHostKeyChecking"
            printf 'Host %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' "$SERVER_HOST" > ~/.ssh/config
          fi

      - name: Create deployment directory
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -p 4422 "$SERVER_USER@$SERVER_HOST" "mkdir -p ~/svaes/$ENVIRONMENT"

      - name: Copy Docker Compose file
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          scp -P 4422 docker-compose.prod.yml "$SERVER_USER@$SERVER_HOST:~/svaes/$ENVIRONMENT/docker-compose.yml"

      - name: Copy nginx configuration
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          scp -P 4422 nginx.conf "$SERVER_USER@$SERVER_HOST:~/svaes/$ENVIRONMENT/" 2>/dev/null || true

      - name: Create .env file
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
          REGISTRY: ${{ env.REGISTRY }}
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          ENGINE_IMAGE: ${{ env.ENGINE_IMAGE }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || vars.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || vars.REDIS_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || vars.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || vars.ENCRYPTION_KEY }}
          ENGINE_API_KEY: ${{ secrets.ENGINE_API_KEY || vars.ENGINE_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS || vars.ALLOWED_ORIGINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || vars.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || vars.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM || vars.SMTP_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || vars.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || vars.ADMIN_PASSWORD }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || vars.APP_BASE_URL }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" "cat > ~/svaes/$ENVIRONMENT/.env << 'ENDOFENV'
          REGISTRY=$REGISTRY
          API_IMAGE=$API_IMAGE
          WEB_IMAGE=$WEB_IMAGE
          ENGINE_IMAGE=$ENGINE_IMAGE
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          REDIS_PASSWORD=$REDIS_PASSWORD
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          ENCRYPTION_KEY=$ENCRYPTION_KEY
          ENGINE_API_KEY=$ENGINE_API_KEY
          ALLOWED_ORIGINS=$ALLOWED_ORIGINS
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_USER=$SMTP_USER
          SMTP_PASSWORD=$SMTP_PASSWORD
          SMTP_FROM=$SMTP_FROM
          ADMIN_EMAIL=$ADMIN_EMAIL
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          APP_BASE_URL=$APP_BASE_URL
          JWT_EXPIRE_MINUTES=60
          TLS_CERT_PATH=./certs
          ENDOFENV"

      - name: Pull latest images
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
          REGISTRY: ${{ env.REGISTRY }}
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          ENGINE_IMAGE: ${{ env.ENGINE_IMAGE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" "export REGISTRY='$REGISTRY' API_IMAGE='$API_IMAGE' WEB_IMAGE='$WEB_IMAGE' ENGINE_IMAGE='$ENGINE_IMAGE' && cd ~/svaes/$ENVIRONMENT && \
            echo '$GITHUB_TOKEN' | docker login $REGISTRY -u '$GITHUB_ACTOR' --password-stdin && \
            docker compose pull"

      - name: Run database migration
        if: inputs.skip_migration == false
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" "cd ~/svaes/$ENVIRONMENT && \
            docker compose run --rm api python -m alembic upgrade head"

      - name: Restart services
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" "cd ~/svaes/$ENVIRONMENT && \
            docker compose down --remove-orphans && \
            fuser -k 8000/tcp 2>/dev/null || true && \
            fuser -k 80/tcp 2>/dev/null || true && \
            fuser -k 443/tcp 2>/dev/null || true && \
            sleep 3 && \
            docker compose up -d"

      - name: Health check
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" " \
            for i in \$(seq 1 30); do \
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then \
                echo 'API is healthy'; break; \
              fi; \
              echo 'Waiting for API...'; sleep 2; \
            done && \
            for i in \$(seq 1 10); do \
              if curl -sf http://localhost/ > /dev/null 2>&1; then \
                echo 'Web is healthy'; break; \
              fi; \
              echo 'Waiting for Web...'; sleep 2; \
            done"

      - name: Show container status
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          ssh -p 4422 "$SERVER_USER@$SERVER_HOST" "cd ~/svaes/$ENVIRONMENT && docker compose ps"
