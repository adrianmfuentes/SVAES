version: 2
updates:
  # Python — pyproject.toml está en apps/api/
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Docker Compose en raíz (postgres:16, redis:7)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfile de la API (python:3.11-slim)
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"