# ── DEV overrides (loaded automatically by Docker Compose) ────────────────────
# Run with: docker compose up
# Requires a .env file at the project root — copy .env.example and fill in values.
#
# What this adds vs base:
#   - Hot reload
#   - Postgres port exposed (dev only — not in production)

services:
  api:
    build:
      target: builder
    volumes:
      - ./api/src:/app/src
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      JWT_EXPIRE_MINUTES: "1440"
    command: /app/.venv/bin/python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  celery-worker:
    environment: {}

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
