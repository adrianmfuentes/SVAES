# ── DEV overrides (loaded automatically by Docker Compose) ────────────────────
# Run with: docker compose up
#
# What this adds vs base:
#   - Hot reload
#   - Postgres port exposed
#   - Permissive dev secrets

services:
  api:
    build:
      target: builder
    volumes:
      - ./api/src:/app/src
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD:-svaes}@postgres:5432/svaes
      JWT_SECRET_KEY: dev-secret-do-not-use-in-production
      JWT_EXPIRE_MINUTES: "1440"
    command: /app/.venv/bin/python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    ports:
      - "5432:5432" 
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
