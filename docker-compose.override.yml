# ── DEV overrides (loaded automatically by Docker Compose) ────────────────────
# Run with: docker compose up
# Requires a .env file at the project root — copy .env.example and fill in values.
#
# What this adds vs base:
#   - Hot reload for api
#   - Angular dev server with hot reload (web-dev service on port 4200)
#   - Postgres port exposed (dev only — not in production)

services:
  api:
    build:
      target: builder
    volumes:
      - ./api/src:/app/src
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      JWT_EXPIRE_MINUTES: "1440"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: amf13azul@gmail.com
      SMTP_PASSWORD: hraxgbjgnnhvlhpd
      SMTP_FROM: amf13azul@gmail.com
    command: /app/.venv/bin/python -m uvicorn src.main:app --host 0.0.0.0 --port 8000

  web-dev:
    image: node:20-alpine
    container_name: svaes-web-dev
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "4200:4200"
    environment:
      API_URL: http://api:8000
    command: >
      sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json"
    networks:
      - svaes-network
    depends_on:
      - api

  celery-worker:
    environment: {}

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
