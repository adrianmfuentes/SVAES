[pytest]
asyncio_mode = auto
testpaths =
    tests/unit
    tests/integration
    tests/security
    tests/performance
pythonpath = api/src
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests requiring database
    unit: unit tests with mocked dependencies
    security: security-focused tests
    e2e: end-to-end acceptance tests
