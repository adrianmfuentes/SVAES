<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <a routerLink="/" class="sidebar-logo">SVAES</a>
    </div>

    <!-- ADMIN (U3) navigation -->
    <nav class="sidebar-nav" *ngIf="isAdmin">
      <div class="nav-section">Sistema</div>

      <a
        routerLink="/app/system"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Visi&oacute;n general
      </a>

      <div class="nav-section">Gesti&oacute;n</div>

      <a
        routerLink="/app/admin"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Administraci&oacute;n
      </a>

      <a
        routerLink="/app/logs"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Registros
      </a>
    </nav>

    <!-- REGULAR USER (U2/U4) navigation -->
    <nav class="sidebar-nav" *ngIf="!isAdmin">
      <div class="nav-section">Principal</div>

      <a
        routerLink="/app/dashboard"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Dashboard
      </a>

      <a
        routerLink="/app/releases"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Entregas
      </a>

      <div class="nav-section">Configuraci&oacute;n</div>

      <a
        routerLink="/app/connectors"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Conectores
      </a>

      <a
        routerLink="/app/profiles"
        routerLinkActive="nav-item-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        Perfiles
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-role-indicator" *ngIf="isAdmin">
        <span class="role-label">Admin global</span>
        <span class="role-badge">U3</span>
      </div>
      <button class="sidebar-logout" (click)="logout()">
        Cerrar sesi&oacute;n
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-inner">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
