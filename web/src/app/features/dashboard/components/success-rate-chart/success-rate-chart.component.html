<div class="chart-card card">
  <h2 class="chart-title">{{ 'dashboard.success_rate_chart' | t }}</h2>

  @if (loading) {
    <div class="chart-skeleton skeleton"></div>
  } @else if (error) {
    <div class="error-banner">{{ error }}</div>
  } @else if (data.length === 0) {
    <div class="chart-empty">{{ 'dashboard.no_data' | t }}</div>
  } @else {
    <div class="chart-wrapper">
      <canvas baseChart
        [type]="'bar'"
        [data]="chartData"
        [options]="chartOptions"
        role="img"
        [attr.aria-label]="'a11y.chart_pass_rate' | t">
      </canvas>
    </div>
  }
</div>
