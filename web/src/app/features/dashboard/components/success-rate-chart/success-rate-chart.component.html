<div class="chart-card card">
  <div class="chart-header">
    <h2 class="chart-title">{{ 'dashboard.success_rate_chart' | t }}</h2>
    @if (data.length > 0) {
      <span class="chart-subtitle">{{ 'dashboard.last_n_periods' | t : { n: data.length } }}</span>
    }
  </div>

  @if (loading) {
    <div class="chart-skeleton"></div>
  } @else if (error) {
    <div class="error-banner">{{ error }}</div>
  } @else if (data.length === 0) {
    <div class="chart-empty">{{ 'dashboard.no_data' | t }}</div>
  } @else {
    <div class="chart-wrapper">
      <canvas baseChart
        [type]="'line'"
        [data]="chartData"
        [options]="chartOptions"
        [attr.aria-label]="'a11y.chart_pass_rate' | t">
      </canvas>
    </div>
  }
</div>
