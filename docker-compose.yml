# ═══════════════════════════════════════════════════════════════════════════════
# SVAES - Docker Compose (Production-ready, single file)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose up -d
#
# Required env vars (set in .env):
#   - POSTGRES_USER, POSTGRES_PASSWORD
#   - REDIS_PASSWORD
#   - JWT_SECRET_KEY, ENCRYPTION_KEY
#   - ENGINE_API_KEY
#   - ALLOWED_ORIGINS
#   - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM
#   - ADMIN_EMAIL, ADMIN_PASSWORD
#   - DATABASE_URL (full connection URL)
#   - TLS_CERT_PATH: directory with fullchain.pem + privkey.pem (defaults to ./certs)
# ═══════════════════════════════════════════════════════════════════════════════

name: svaes

services:
  postgres:
    image: postgres:17-alpine
    container_name: svaes-postgres
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svaes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: svaes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svaes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - svaes-network

  redis:
    image: redis:7-alpine
    container_name: svaes-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - svaes-network

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: svaes-engine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s
    networks:
      - svaes-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: svaes-api
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      UVICORN_LOG_LEVEL: warning
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - svaes-network

  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: svaes-celery
    restart: always
    command: celery -A src.infrastructure.secondary.queue.celery_app worker --loglevel=warning
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - svaes-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: svaes-web
    restart: always
    ports:
      - "8880:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - svaes-network
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  svaes-network:
    driver: bridge
