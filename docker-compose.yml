# ═══════════════════════════════════════════════════════════════════════════════
# SVAES - Docker Compose (Production-ready, single file)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose up -d
#
# Required env vars (set in .env):
#   - POSTGRES_USER, POSTGRES_PASSWORD
#   - REDIS_PASSWORD
#   - JWT_SECRET_KEY, ENCRYPTION_KEY
#   - ENGINE_API_KEY
#   - ALLOWED_ORIGINS
#   - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM
#   - ADMIN_EMAIL, ADMIN_PASSWORD
#   - DATABASE_URL (full connection URL)
#   - TLS_CERT_PATH: directory with fullchain.pem + privkey.pem (defaults to ./certs)
# ═══════════════════════════════════════════════════════════════════════════════

name: svaes

services:
  postgres:
    image: postgres:16-alpine
    container_name: svaes-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svaes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: svaes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svaes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - svaes-network

  redis:
    image: redis:7-alpine
    container_name: svaes-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - svaes-network

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: svaes-engine
    restart: always
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - svaes-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: svaes-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - svaes-network

  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: svaes-celery
    restart: always
    command: celery -A src.infrastructure.secondary.queue.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - svaes-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: svaes-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./certs}:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - svaes-network
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  svaes-network:
    driver: bridge
