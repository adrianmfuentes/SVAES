services:
  api:
    build:
      context: ./apps/api
      target: runtime
    environment:
      PYTHONPATH: /app/src
    networks:
      - svaes-internal
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: svaes
      POSTGRES_PASSWORD: svaes
      POSTGRES_DB: svaes
    networks:
      - svaes-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svaes"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    networks:
      - svaes-internal

networks:
  svaes-internal:
    driver: bridge
