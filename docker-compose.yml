services:
  backend:
    build: ./apps/api
    container_name: svaes-backend
    ports:
      - "8000:8000"
    networks:
      - svaes-internal

  postgres:
    image: postgres:16
    container_name: svaes-postgres
    environment:
      POSTGRES_USER: svaes
      POSTGRES_PASSWORD: svaes
      POSTGRES_DB: svaes
    networks:
      - svaes-internal

  redis:
    image: redis:7
    container_name: svaes-redis
    networks:
      - svaes-internal

networks:
  svaes-internal:
    driver: bridge