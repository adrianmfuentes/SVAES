# ═══════════════════════════════════════════════════════════════════════════════
# SVAES - Base docker-compose (shared config)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   Dev:    docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

name: svaes

services:
  postgres:
    image: postgres:16-alpine
    container_name: svaes-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svaes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: svaes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svaes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - svaes-network

  redis:
    image: redis:7-alpine
    container_name: svaes-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - svaes-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: svaes-mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - svaes-network

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: svaes-engine
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - svaes-network

  api: &api
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: svaes-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-svaes}:${POSTGRES_PASSWORD}@postgres:5432/svaes
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200}
      ENGINE_URL: http://engine:8081
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@svaes.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - svaes-network

  celery-worker:
    <<: *api
    container_name: svaes-celery
    command: celery -A src.infrastructure.secondary.queue.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: svaes-web
    profiles:
      - prod
    ports:
      - "4200:80"
    volumes:
      - ./web/dist/web/browser:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - svaes-network

volumes:
  postgres_data:

networks:
  svaes-network:
    driver: bridge
