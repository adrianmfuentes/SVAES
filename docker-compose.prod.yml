# ═══════════════════════════════════════════════════════════════════════════════
# SVAES - Production docker-compose
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env or environment):
#   - POSTGRES_USER, POSTGRES_PASSWORD (strong, randomly generated)
#   - REDIS_PASSWORD
#   - JWT_SECRET_KEY, ENCRYPTION_KEY
#   - ENGINE_API_KEY
#   - DATABASE_URL (full connection URL)
#   - ALLOWED_ORIGINS (production domain)
#   - SMTP_* (email provider)
#   - ADMIN_EMAIL, ADMIN_PASSWORD
# ═══════════════════════════════════════════════════════════════════════════════

services:
  api:
    restart: always
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production

  celery-worker:
    restart: always

  postgres:
    restart: always
    ports: []
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    restart: always

  engine:
    restart: always
    ports: []

volumes:
  postgres_prod_data:
