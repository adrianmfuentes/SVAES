[project]
name = "svaes-api"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi~=0.136.1",
    "uvicorn[standard]~=0.47.0",
    "alembic~=1.18.4",
    "sqlalchemy~=2.0.49",
    "psycopg[binary]~=3.3.4",
    "python-dotenv~=1.2.2",
    "passlib[bcrypt]~=1.7.4",
    "bcrypt<4.5.0",
    "PyJWT~=2.12.1",
    "cryptography~=48.0.0",
    "email-validator~=2.3.0",
    "pydantic-settings~=2.14.1",
    "slowapi~=0.1.9",
"celery~=5.6.3",
    "redis~=5.0.0",
    "httpx~=0.28.1",
    "reportlab~=4.5.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=7.1.0",
    "httpx>=0.28.1",
    "pytest-mock",
    "factory-boy",
    "faker",
    "testcontainers",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["../../tests"]
pythonpath = ["src"]
